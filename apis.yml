description: >-
  FMC Corporation (NYSE: FMC) is a global agricultural sciences company headquartered
  in Philadelphia, Pennsylvania, with roots dating to 1883. FMC develops, manufactures,
  and sells crop protection chemistries (insecticides, herbicides, fungicides),
  biological solutions (biopesticides, biostimulants, biofertilizers, pheromones),
  seed treatments, and precision agriculture technology. Following the 2019 spin-off
  of Livent (lithium) and the 2021 divestiture of the Health & Nutrition business
  to DuPont/Eastman, FMC operates as a focused pure-play agricultural sciences
  company. The 2022 acquisition of Argentine biologicals firm BIOPHERO accelerated
  FMC's pheromone-based crop protection portfolio (Sofero brand).
