  - type: Features
    data:
      - name: Diamide Insecticide Chemistry
        description: >-
          Rynaxypyr (chlorantraniliprole) and Cyazypyr (cyantraniliprole) diamide
          active ingredients marketed under Coragen, Prevathon, Altacor, Verimark,
          and Vantacor brands for control of lepidopteran pests.
      - name: Isoflex Herbicide Platform
        description: >-
          Isoflex active herbicide powered by Dodhylex technology — a new mode-of-action
          herbicide for resistance management in cereals and other row crops.
      - name: Fluindapyr Fungicide Platform
        description: >-
          Fluindapyr-based fungicides (Adastrio, Onsuva) provide control of soybean
          rust and other foliar diseases with extended residual activity.
      - name: Biologicals by FMC
        description: >-
          Integrated biologicals portfolio of biopesticides, biostimulants,
          biofertilizers, and pheromones designed to work alongside synthetic
          chemistry for sustainable crop protection.
      - name: Sofero Pheromone Mating Disruption
        description: >-
          Row-crop pheromone solution from the 2022 BIOPHERO acquisition, applying
          sex-pheromone mating disruption to broad-acre pest management.
      - name: Arc Farm Intelligence
        description: >-
          Precision agriculture platform combining field sensors, predictive
          pest pressure modeling, and spray-timing advisories for growers and
          ag retailers.
      - name: Seed Treatment Portfolio
        description: >-
          Seed-applied insecticide, fungicide, and nematicide products including
          Ethos, Lucento, and Quartzo for corn, soybeans, cotton, and cereals.
  - type: UseCases
    data:
      - name: Row Crop Insect Control
        description: >-
          Growers protecting corn, soybeans, cotton, and rice from caterpillar
          and beetle pests using FMC diamide insecticides.
      - name: Herbicide Resistance Management
        description: >-
          Cereal and row-crop growers rotating Isoflex (Dodhylex) into spray
          programs to counter glyphosate- and ALS-resistant weed populations.
      - name: Soybean Disease Control
        description: >-
          Soybean producers in Brazil, Argentina, and North America applying
          fluindapyr fungicides for Asian soybean rust and other foliar diseases.
      - name: Integrated Biologicals Programs
        description: >-
          Growers integrating FMC biopesticides, biostimulants, and biofertilizers
          alongside synthetic chemistry to meet sustainability and residue targets.
      - name: Pheromone-Based Mating Disruption
        description: >-
          Row-crop and specialty-crop growers deploying Sofero pheromones for
          preventative pest control with low non-target impact.
      - name: Precision Spray Decision Support
        description: >-
          Ag retailers and growers using Arc farm intelligence sensor and
          modeling data to time insecticide and fungicide applications.
      - name: Seed-Applied Protection
        description: >-
          Seed companies and growers using FMC seed treatments to protect
          emerging seedlings from early-season pests and diseases.
  - type: Integrations
    data:
      - name: Ag Retailers and Distributors
        description: >-
          FMC distributes through agricultural retail and distribution networks
          including Nutrien Ag Solutions, Helena, Wilbur-Ellis, GROWMARK, and
          regional cooperatives.
      - name: Seed Companies
        description: >-
          FMC seed treatment products are applied by major seed companies
          including Corteva (Pioneer), Bayer, Syngenta, and regional seed brands.
      - name: Regulatory Agencies
        description: >-
          Active-ingredient registrations and label maintenance with US EPA,
          EU EFSA / national regulators, Brazilian MAPA, ANVISA, and crop
          protection regulators worldwide.
      - name: Research Partnerships
        description: >-
          Collaborations with land-grant universities, CGIAR centers, and
          private R&D firms on new active-ingredient discovery and product
          stewardship.
      - name: FMC Ventures
        description: >-
          Corporate venture arm investing in ag-tech, biologicals, digital
          agriculture, and precision spray startups complementary to FMC's
          core portfolio.
