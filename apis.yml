  - aid: fmc-corporation:fmc-insecticides
    name: FMC Insecticides
    tags:
      - Agriculture
      - Crop Protection
      - Insecticides
      - Miticides
    humanURL: https://ag.fmc.com
    properties:
      - url: https://ag.fmc.com
        type: Documentation
    description: >-
      FMC's insecticide and miticide portfolio includes diamide chemistry
      (Rynaxypyr, Cyazypyr active ingredients) marketed under brands such as
      Coragen, Prevathon, Altacor, Verimark, Vantacor, and Premio for control
      of lepidopteran and other arthropod pests across row crops, specialty
      crops, and vegetables.

  - aid: fmc-corporation:fmc-herbicides
    name: FMC Herbicides
    tags:
      - Agriculture
      - Crop Protection
      - Herbicides
      - Weed Control
    humanURL: https://ag.fmc.com
    properties:
      - url: https://ag.fmc.com
        type: Documentation
    description: >-
      FMC's herbicide portfolio spans preemergence and postemergence chemistries
      including sulfentrazone, clomazone, carfentrazone (Aim), and the newly
      launched Isoflex active herbicide powered by Dodhylex technology for
      resistance management in cereals, soybeans, corn, and rice.

  - aid: fmc-corporation:fmc-fungicides
    name: FMC Fungicides
    tags:
