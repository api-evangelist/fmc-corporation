meters:
  - name: product_purchase
    description: Crop protection product purchase (insecticide, herbicide, fungicide, biological, seed treatment) — not a metered API unit.
    unit: package
    aggregation: count
    dimensions:
      - product
      - region
      - crop
  - name: service_engagement
    description: Precision-ag advisory engagement (Arc farm intelligence) — service contract, not a metered API unit.
    unit: account
    aggregation: count
    dimensions:
      - customer
      - region
principles:
  - name: Visibility
    description: >-
      Track FMC product spend as part of farm-input or agronomy operations spend;
      FMC does not provide a metered API usage feed.
  - name: Allocation
    description: >-
      Allocate cost to the crop, field, or program that consumes the product
      or advisory service.
  - name: Optimization
    description: >-
      Optimize spend by aligning product choice and rates with pest pressure,
      resistance management, and label guidance from FMC technical reps.
  - name: Accountability
    description: >-
      Farm operations / agronomy leadership owns the FMC relationship; finance
      reconciles channel invoices. Review at season-end agronomy planning.
