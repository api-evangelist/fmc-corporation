description: >-
  FMC Corporation's commercial surface is delivered as physical crop protection
  product purchases through ag-retail channels and as service engagements
  (Arc farm intelligence). There is no metered API invoice. FinOps mapping is
  structural only — costs flow through product procurement and service contracts,
  not a metered software-API line item.
notes: >-
  No public developer pricing — placeholder only. Costs flow through ag-product
  purchasing and service contracts rather than a metered API line item.
sources:
